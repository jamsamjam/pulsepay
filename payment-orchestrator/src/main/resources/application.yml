spring:
  application:
    name: payment-orchestrator
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pulsepay}
    username: ${SPRING_DATASOURCE_USERNAME:pulsepay}
    password: ${SPRING_DATASOURCE_PASSWORD:pulsepay}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 200
      min-spare: 20

services:
  fraud-engine:
    url: ${FRAUD_ENGINE_URL:http://localhost:8000}
  provider-router:
    url: ${PROVIDER_ROUTER_URL:http://localhost:8081}
  ledger:
    url: ${LEDGER_URL:http://localhost:8082}

fraud:
  block-threshold: ${FRAUD_BLOCK_THRESHOLD:80}
  flag-threshold: ${FRAUD_FLAG_THRESHOLD:50}

saga:
  max-retries: 3
  retry-backoff-ms: 500

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pulsepay: INFO
